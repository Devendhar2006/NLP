services:
  mongo:
    image: mongo:7
    container_name: childsafe-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nlp-service:
    build:
      context: ./nlp-service
    container_name: childsafe-nlp
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy

  server:
    build:
      context: ./server
    container_name: childsafe-server
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/childsafe_ai_filter
      JWT_SECRET: change_this_in_production
      NLP_SERVICE_URL: http://nlp-service:8000
      FRONTEND_URL: http://localhost:8080
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy
      nlp-service:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: childsafe-client
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
